<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0
                0 0.55 0 0 0
                0 0 0.05 0 0
                0 0 0 0.9 0"
        result="colored"
      />
      <feMerge>
        <feMergeNode in="colored"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="strokeGrad" x1="320" y1="200" x2="1350" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF6A00" stop-opacity="0.0"/>
      <stop offset="0.25" stop-color="#FF6A00" stop-opacity="0.25"/>
      <stop offset="0.65" stop-color="#FF8A2A" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FF6A00" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <g filter="url(#glow)" opacity="0.9">
    <path d="M220 680 C 460 520, 620 760, 820 630 C 1040 488, 1200 610, 1380 520" stroke="url(#strokeGrad)" stroke-width="2"/>
    <path d="M260 520 C 480 410, 640 520, 820 460 C 1060 380, 1180 460, 1420 340" stroke="url(#strokeGrad)" stroke-width="1.6" opacity="0.85"/>
    <path d="M300 760 C 520 640, 640 820, 880 720 C 1100 630, 1240 740, 1460 640" stroke="url(#strokeGrad)" stroke-width="1.4" opacity="0.7"/>
    <path d="M360 420 C 560 300, 700 390, 920 320 C 1120 255, 1280 330, 1500 240" stroke="url(#strokeGrad)" stroke-width="1.2" opacity="0.55"/>

    <circle cx="1010" cy="520" r="2.2" fill="#FF7A10" fill-opacity="0.55"/>
    <circle cx="1140" cy="470" r="1.8" fill="#FF7A10" fill-opacity="0.45"/>
    <circle cx="1250" cy="560" r="1.6" fill="#FF7A10" fill-opacity="0.35"/>
    <circle cx="920" cy="600" r="1.4" fill="#FF7A10" fill-opacity="0.30"/>
  </g>
</svg>
